name: TradingView Tum Haber Botu

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: tradingview-all-news
  cancel-in-progress: false

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tarayici ve kutuphaneleri yukle
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: TradingView haberlerini cek ve Telegram'a gonder
        shell: python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup
          import html
          import json
          import os
          import re
          import time
          from urllib.parse import urlparse, urlunparse

          import requests

          TV_BASE_URL = "https://tr.tradingview.com"
          TV_NEWS_URL = "https://tr.tradingview.com/news-flow/"
          CACHE_FILE = "tv_news_cache.json"
          NEWS_LIMIT = 80
          CACHE_LIMIT = 500
          INITIAL_SEND_LIMIT = 10
          PER_RUN_SEND_LIMIT = 60
          ARTICLE_TEXT_LIMIT = 2400

          token = os.environ.get("TELEGRAM_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")

          if not token or not chat_id:
              raise SystemExit("TELEGRAM_TOKEN veya TELEGRAM_CHAT_ID eksik.")

          def normalize_space(value):
              return re.sub(r"\s+", " ", value or "").strip()

          def normalized_link(value):
              if not value:
                  return ""
              parsed = urlparse(value)
              return urlunparse((parsed.scheme, parsed.netloc, parsed.path.rstrip("/"), "", "", ""))

          def news_key(news):
              return normalized_link(news.get("link")) or normalize_space(news.get("title")).lower()

          def unique_keys(keys):
              seen = set()
              result = []
              for key in keys:
                  key = normalize_space(key)
                  if key and key not in seen:
                      seen.add(key)
                      result.append(key)
                  if len(result) >= CACHE_LIMIT:
                      break
              return result

          def load_cache(path):
              if not os.path.exists(path):
                  return []
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception:
                  return []
              if not isinstance(data, list):
                  return []
              loaded = []
              for item in data:
                  if isinstance(item, str) and item.strip():
                      loaded.append(item.strip())
                  elif isinstance(item, dict):
                      value = item.get("id") or item.get("link") or item.get("title")
                      if isinstance(value, str) and value.strip():
                          loaded.append(value.strip())
              return loaded

          def save_cache(keys):
              with open(CACHE_FILE, "w", encoding="utf-8") as f:
                  json.dump(unique_keys(keys), f, ensure_ascii=False, indent=2)

          old_news = load_cache(CACHE_FILE)
          old_news_set = set(old_news)
          old_title_set = {normalize_space(item).lower() for item in old_news}

          blocked_article_text = [
              "ICE Data Services", "FactSet", "Telif Hakki", "Telif Hakkı",
              "CUSIP", "SEC dosyalari", "SEC dosyaları", "TradingView, Inc",
              "Tum haklari saklidir", "Tüm hakları saklıdır",
          ]

          def is_known(news):
              return (
                  news_key(news) in old_news_set
                  or normalize_space(news.get("title")).lower() in old_title_set
              )

          def send_telegram(text):
              tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
              response = requests.post(
                  tg_url,
                  json={
                      "chat_id": chat_id,
                      "text": text,
                      "parse_mode": "HTML",
                      "link_preview_options": {"is_disabled": True},
                  },
                  timeout=15,
              )
              if response.status_code >= 400:
                  raise RuntimeError(f"Telegram hata verdi: {response.status_code} {response.text[:300]}")

          def trim_article_text(value):
              value = normalize_space(value).replace(". ", ".\n\n")
              if len(value) <= ARTICLE_TEXT_LIMIT:
                  return value
              return value[:ARTICLE_TEXT_LIMIT].rsplit(" ", 1)[0].strip() + "..."

          def extract_article_text(page):
              soup = BeautifulSoup(page.content(), "html.parser")
              paragraphs = soup.select(
                  "article p, div[class*='body'] p, div[class*='article'] p, "
                  "div[class*='content'] p"
              )
              if not paragraphs:
                  paragraphs = soup.find_all("p")

              clean = []
              for p_tag in paragraphs:
                  text = normalize_space(p_tag.get_text(" ", strip=True))
                  if len(text) < 40:
                      continue
                  if any(blocked in text for blocked in blocked_article_text):
                      continue
                  clean.append(text)
              return trim_article_text("\n\n".join(clean))

          with sync_playwright() as p:
              print(f"TradingView haber akisi aciliyor: {TV_NEWS_URL}")
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  viewport={"width": 1920, "height": 1080},
                  locale="tr-TR",
                  timezone_id="Europe/Istanbul",
              )
              page = context.new_page()

              try:
                  page.goto(TV_NEWS_URL, timeout=45000, wait_until="domcontentloaded")
                  page.wait_for_selector('a[href*="/news/"]', timeout=20000)
                  for _ in range(8):
                      page.mouse.wheel(0, 1000)
                      page.wait_for_timeout(900)
              except Exception as e:
                  print(f"Sayfa tam yuklenmemis olabilir; eldeki DOM ile devam ediliyor: {e}")

              found_news_links = page.evaluate(
                  """({baseUrl, skipTextParts, limit}) => {
                      const results = [];
                      const seen = new Set();
                      const clean = (value) => (value || "").replace(/\\s+/g, " ").trim();
                      const isCategoryLink = (link) => {
                          const path = new URL(link, baseUrl).pathname;
                          return /^\\/news\\/(markets|stocks|crypto|forex|futures|bonds|economy|all|authors)?\\/?$/i.test(path);
                      };
                      const isBadLine = (line) => {
                          const lower = line.toLocaleLowerCase("tr-TR");
                          if (line.length < 12) return true;
                          if (skipTextParts.some((part) => lower.includes(part))) return true;
                          if (/^(\\d+\\s*(dk|sa|saat|gun|gün)|\\d{1,2}:\\d{2})/i.test(lower)) return true;
                          if (/^(borsa|kripto|forex|vadeli|tahvil|ekonomi|piyasa|haberler)$/i.test(lower)) return true;
                          return false;
                      };
                      const scoreLine = (candidate) => {
                          const targetLength = Math.min(candidate.line.length, 150);
                          const penalty = Math.max(0, candidate.line.length - 190) * 2;
                          return candidate.weight * 1000 + targetLength - penalty;
                      };

                      const anchors = Array.from(document.querySelectorAll('a[href*="/news/"]'));
                      for (const anchor of anchors) {
                          const href = anchor.getAttribute("href") || "";
                          if (!href) continue;

                          const link = href.startsWith("http") ? href : new URL(href, baseUrl).href;
                          if (isCategoryLink(link)) continue;

                          const card = anchor.closest(
                              'article, [data-testid*="news"], div[class*="story"], div[class*="Story"], div[class*="card"], div[class*="Card"], div[class*="item"], div[class*="Item"]'
                          ) || anchor.parentElement;

                          const groups = [
                              {text: anchor.innerText, weight: 3},
                              {text: anchor.textContent, weight: 3},
                              {text: card ? card.innerText : "", weight: 1},
                              {text: card ? card.textContent : "", weight: 1},
                          ].filter((group) => group.text);

                          const candidates = [];
                          for (const group of groups) {
                              for (const line of group.text.split("\\n").map(clean)) {
                                  if (!isBadLine(line)) {
                                      candidates.push({line, weight: group.weight});
                                  }
                              }
                          }
                          if (!candidates.length) continue;

                          candidates.sort((a, b) => scoreLine(b) - scoreLine(a));
                          let title = candidates[0].line;
                          if (title.length > 220) title = title.slice(0, 217).trim() + "...";

                          const dedupeKey = link.split(/[?#]/)[0];
                          if (seen.has(dedupeKey) || seen.has(title)) continue;
                          seen.add(dedupeKey);
                          seen.add(title);
                          results.push({title, link});
                          if (results.length >= limit) break;
                      }
                      return results;
                  }""",
                  {
                      "baseUrl": TV_BASE_URL,
                      "skipTextParts": ["giris yap", "giriş yap", "premium", "ozel haber", "özel haber"],
                      "limit": NEWS_LIMIT,
                  },
              )

              print(f"TradingView akistan bulunan haber sayisi: {len(found_news_links)}")
              for item in found_news_links[:10]:
                  print(f"- {item['title']}")

              if not found_news_links:
                  print("Haber bulunamadi; cache degistirilmeyecek.")
                  browser.close()
                  raise SystemExit(0)

              if not old_news:
                  news_to_process = list(reversed(found_news_links[:INITIAL_SEND_LIMIT]))
                  cache_after_run = [news_key(news) for news in found_news_links] + old_news
                  print(f"Ilk calistirma: son {len(news_to_process)} haber gonderilecek, gorunen diger haberler tekrar atilmamak uzere cache'lenecek.")
              else:
                  all_new = [news for news in reversed(found_news_links) if not is_known(news)]
                  news_to_process = all_new[:PER_RUN_SEND_LIMIT]
                  if len(all_new) > PER_RUN_SEND_LIMIT:
                      cache_after_run = [news_key(news) for news in news_to_process] + old_news
                      print(f"Yeni haber sayisi {len(all_new)}; bu tur {len(news_to_process)} haber gonderilecek, kalani sonraki tura birakilacak.")
                  else:
                      cache_after_run = [news_key(news) for news in found_news_links] + old_news
                      print(f"Yeni haber sayisi: {len(news_to_process)}")

              for news in news_to_process:
                  print(f"Gonderiliyor: {news['title'][:90]}")
                  article_text = ""
                  try:
                      page.goto(news["link"], timeout=30000, wait_until="domcontentloaded")
                      page.wait_for_timeout(1500)
                      article_text = extract_article_text(page)
                  except Exception as e:
                      print(f"Haber detayi okunamadi, baslik ve link gonderilecek: {e}")

                  safe_title = html.escape(news["title"])
                  safe_link = html.escape(news["link"], quote=True)
                  if article_text:
                      message = (
                          f"<b>{safe_title}</b>\n\n"
                          f"{html.escape(article_text)}\n\n"
                          f"<a href=\"{safe_link}\">TradingView'de oku</a>"
                      )
                  else:
                      message = f"<b>{safe_title}</b>\n\n<a href=\"{safe_link}\">TradingView'de oku</a>"

                  send_telegram(message)
                  time.sleep(2)

              browser.close()

          save_cache(cache_after_run)
          print("TradingView haber cache'i guncellendi.")

      - name: Cache kaydet
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add tv_news_cache.json
          git commit -m "Haber cache guncellendi [skip ci]" || echo "Degisiklik yok"
          git pull --rebase || echo "Cekilecek yeni bir sey yok"
          git push || echo "Push hatasi, sonraki turda tekrar denenecek"
