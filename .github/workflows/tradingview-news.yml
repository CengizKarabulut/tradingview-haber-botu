name: TradingView Tum Haber Botu

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: tradingview-all-news
  cancel-in-progress: false

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tarayici ve kutuphaneleri yukle
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: TradingView haberlerini cek ve Telegram'a gonder
        shell: python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          from playwright.sync_api import sync_playwright
          import html
          import json
          import os
          import re
          import time
          from urllib.parse import urlparse, urlunparse

          import requests

          TV_BASE_URL = "https://tr.tradingview.com"
          TV_NEWS_URL = "https://tr.tradingview.com/news-flow/"
          CACHE_FILE = "tv_news_cache.json"
          NEWS_LIMIT = 100
          CACHE_LIMIT = 500
          PER_RUN_SEND_LIMIT = 100

          token = os.environ.get("TELEGRAM_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")
          message_thread_id = os.environ.get("TELEGRAM_MESSAGE_THREAD_ID")

          if not token or not chat_id:
              raise SystemExit("TELEGRAM_TOKEN veya TELEGRAM_CHAT_ID eksik.")
          if message_thread_id:
              try:
                  message_thread_id = int(message_thread_id)
              except ValueError:
                  raise SystemExit("TELEGRAM_MESSAGE_THREAD_ID sayisal olmalidir.")

          def normalize_space(value):
              return re.sub(r"\s+", " ", value or "").strip()

          def normalized_link(value):
              if not value:
                  return ""
              parsed = urlparse(value)
              return urlunparse((parsed.scheme, parsed.netloc, parsed.path.rstrip("/"), "", "", ""))

          def news_key(news):
              return normalized_link(news.get("link")) or normalize_space(news.get("title")).lower()

          def unique_keys(keys):
              seen = set()
              result = []
              for key in keys:
                  key = normalize_space(key)
                  if key and key not in seen:
                      seen.add(key)
                      result.append(key)
                  if len(result) >= CACHE_LIMIT:
                      break
              return result

          def load_state(path):
              state = {"last_seen_key": "", "seen_keys": []}
              if not os.path.exists(path):
                  return state
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception:
                  return state

              if isinstance(data, dict):
                  seen_keys = data.get("seen_keys", [])
                  if isinstance(seen_keys, list):
                      state["seen_keys"] = [
                          item.strip()
                          for item in seen_keys
                          if isinstance(item, str) and item.strip()
                      ]
                  last_seen_key = data.get("last_seen_key")
                  if isinstance(last_seen_key, str):
                      state["last_seen_key"] = last_seen_key.strip()
                  if not state["last_seen_key"] and state["seen_keys"]:
                      state["last_seen_key"] = state["seen_keys"][0]
                  return state

              if not isinstance(data, list):
                  return state

              loaded = []
              for item in data:
                  if isinstance(item, str) and item.strip():
                      loaded.append(item.strip())
                  elif isinstance(item, dict):
                      value = item.get("id") or item.get("link") or item.get("title")
                      if isinstance(value, str) and value.strip():
                          loaded.append(value.strip())
              state["seen_keys"] = loaded
              if loaded:
                  state["last_seen_key"] = loaded[0]
              return state

          def save_state(last_seen_key, keys):
              with open(CACHE_FILE, "w", encoding="utf-8") as f:
                  json.dump(
                      {
                          "last_seen_key": last_seen_key,
                          "seen_keys": unique_keys(keys),
                      },
                      f,
                      ensure_ascii=False,
                      indent=2,
                  )

          cache_state = load_state(CACHE_FILE)
          old_news = cache_state["seen_keys"]
          last_seen_key = cache_state["last_seen_key"]
          old_news_set = set(old_news)

          def send_telegram(text):
              tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
              payload = {
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "HTML",
                  "link_preview_options": {"is_disabled": True},
              }
              if message_thread_id:
                  payload["message_thread_id"] = message_thread_id

              response = requests.post(
                  tg_url,
                  json=payload,
                  timeout=15,
              )
              if response.status_code >= 400:
                  raise RuntimeError(f"Telegram hata verdi: {response.status_code} {response.text[:300]}")

          with sync_playwright() as p:
              print(f"TradingView haber akisi aciliyor: {TV_NEWS_URL}")
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  viewport={"width": 1920, "height": 1080},
                  locale="tr-TR",
                  timezone_id="Europe/Istanbul",
              )
              page = context.new_page()

              try:
                  page.goto(TV_NEWS_URL, timeout=45000, wait_until="domcontentloaded")
                  page.wait_for_selector('a[href*="/news/"]', timeout=20000)
                  for _ in range(8):
                      page.mouse.wheel(0, 1000)
                      page.wait_for_timeout(900)
              except Exception as e:
                  print(f"Sayfa tam yuklenmemis olabilir; eldeki DOM ile devam ediliyor: {e}")

              found_news_links = page.evaluate(
                  """({baseUrl, skipTextParts, limit}) => {
                      const results = [];
                      const seen = new Set();
                      const clean = (value) => (value || "").replace(/\\s+/g, " ").trim();
                      const providerFromLink = (link) => {
                          const path = new URL(link, baseUrl).pathname;
                          const match = path.match(/^\\/news\\/([^:]+):/i);
                          if (!match) return "";
                          const raw = match[1]
                              .replace(/\\.com.*$/i, "")
                              .replace(/[^a-z0-9]+/gi, " ")
                              .trim();
                          if (!raw) return "";
                          return raw
                              .split(" ")
                              .map((part) => part ? part[0].toUpperCase() + part.slice(1).toLowerCase() : "")
                              .join(" ");
                      };
                      const stripProviderPrefix = (title, provider) => {
                          let value = clean(title);
                          if (!provider) return value;
                          const variants = [
                              provider,
                              provider.replace(/\\s+/g, ""),
                              provider.split(" ")[0],
                          ].filter(Boolean);
                          for (const variant of variants) {
                              const lowerValue = value.toLocaleLowerCase("tr-TR");
                              const lowerVariant = variant.toLocaleLowerCase("tr-TR");
                              if (lowerValue === lowerVariant) return "";
                              if (lowerValue.startsWith(lowerVariant) && value.length > variant.length + 8) {
                                  value = value.slice(variant.length).replace(/^\\s*[:|\\-–—]?\\s*/, "");
                              }
                          }
                          return value;
                      };
                      const articlePath = (link) => new URL(link, baseUrl).pathname;
                      const isCategoryLink = (link) => {
                          const path = articlePath(link);
                          return /^\\/news\\/(markets|stocks|crypto|forex|futures|bonds|economy|all|authors)?\\/?$/i.test(path);
                      };
                      const isArticleLink = (link) => {
                          const path = articlePath(link);
                          return /^\\/news\\/[^/]+:[^/]+/i.test(path) && !isCategoryLink(link);
                      };
                      const isBadLine = (line) => {
                          const lower = line.toLocaleLowerCase("tr-TR");
                          if (line.length < 12) return true;
                          if (skipTextParts.some((part) => lower.includes(part))) return true;
                          if (/^(\\d+\\s*(dk|sa|saat|gun|gün)|\\d{1,2}:\\d{2})/i.test(lower)) return true;
                          if (/^(borsa|kripto|forex|vadeli|tahvil|ekonomi|piyasa|haberler)$/i.test(lower)) return true;
                          if (/^(reuters|beincrypto|matriks|foreks|kap|tradingview)$/i.test(lower)) return true;
                          return false;
                      };
                      const collectLines = (value, weight, provider) => {
                          const lines = [];
                          for (const part of String(value || "").split("\\n").map(clean)) {
                              const line = stripProviderPrefix(part, provider);
                              if (!isBadLine(line)) {
                                  lines.push({line, weight});
                              }
                          }
                          return lines;
                      };
                      const scoreLine = (candidate, provider) => {
                          let score = candidate.weight * 1000;
                          score += Math.min(candidate.line.length, 150);
                          score -= Math.max(0, candidate.line.length - 180) * 3;
                          if (provider && candidate.line.toLocaleLowerCase("tr-TR").startsWith(provider.toLocaleLowerCase("tr-TR"))) {
                              score -= 500;
                          }
                          return score;
                      };

                      const anchors = Array.from(document.querySelectorAll('a[href*="/news/"]'));
                      for (const anchor of anchors) {
                          const href = anchor.getAttribute("href") || "";
                          if (!href) continue;

                          const link = href.startsWith("http") ? href : new URL(href, baseUrl).href;
                          if (!isArticleLink(link)) continue;
                          const provider = providerFromLink(link);

                          const card = anchor.closest(
                              'article, [data-testid*="news"], div[class*="story"], div[class*="Story"], div[class*="card"], div[class*="Card"], div[class*="item"], div[class*="Item"]'
                          ) || anchor.parentElement;

                          const candidates = [];
                          candidates.push(...collectLines(anchor.getAttribute("aria-label"), 5, provider));
                          candidates.push(...collectLines(anchor.getAttribute("title"), 5, provider));
                          candidates.push(...collectLines(anchor.innerText, 4, provider));

                          const possibleTitleNodes = card
                              ? Array.from(card.querySelectorAll('[class*="title"], [class*="Title"], [class*="headline"], [class*="Headline"], h1, h2, h3'))
                              : [];
                          for (const node of possibleTitleNodes) {
                              candidates.push(...collectLines(node.innerText || node.textContent, 3, provider));
                          }

                          if (!candidates.length) {
                              candidates.push(...collectLines(anchor.textContent, 2, provider));
                          }
                          if (!candidates.length && card) {
                              candidates.push(...collectLines(card.innerText, 1, provider));
                          }
                          if (!candidates.length) continue;

                          candidates.sort((a, b) => scoreLine(b, provider) - scoreLine(a, provider));
                          let title = candidates[0].line;
                          if (title.length > 220) title = title.slice(0, 217).trim() + "...";

                          const dedupeKey = link.split(/[?#]/)[0];
                          if (seen.has(dedupeKey)) continue;
                          seen.add(dedupeKey);
                          results.push({title, link, provider});
                          if (results.length >= limit) break;
                      }
                      return results;
                  }""",
                  {
                      "baseUrl": TV_BASE_URL,
                      "skipTextParts": ["giris yap", "giriş yap", "premium", "ozel haber", "özel haber"],
                      "limit": NEWS_LIMIT,
                  },
              )

              print(f"TradingView akistan bulunan haber sayisi: {len(found_news_links)}")
              for item in found_news_links[:10]:
                  print(f"- {item['title']}")

              if not found_news_links:
                  print("Haber bulunamadi; cache degistirilmeyecek.")
                  browser.close()
                  raise SystemExit(0)

              current_keys = [news_key(news) for news in found_news_links]
              latest_key = current_keys[0]

              if not last_seen_key:
                  news_to_process = []
                  print("Ilk calistirma: en ustteki haber referans alindi; eski haberler gonderilmeyecek.")
              elif last_seen_key in current_keys:
                  cutoff_index = current_keys.index(last_seen_key)
                  news_to_process = list(reversed(found_news_links[:cutoff_index]))[:PER_RUN_SEND_LIMIT]
                  print(f"Son gorulen haber bulundu. Yeni haber sayisi: {cutoff_index}")
              else:
                  seen_indexes = [
                      index
                      for index, key in enumerate(current_keys)
                      if key in old_news_set
                  ]
                  if seen_indexes:
                      cutoff_index = min(seen_indexes)
                      news_to_process = list(reversed(found_news_links[:cutoff_index]))[:PER_RUN_SEND_LIMIT]
                      print(f"Son gorulen haber listede yok, ama daha once gorulmus bir haber bulundu. Yeni haber sayisi: {cutoff_index}")
                  else:
                      news_to_process = []
                      print("Son gorulen haber akista bulunamadi; eski haberleri tekrar atmamak icin sadece yeni referans alinacak.")

              for news in news_to_process:
                  print(f"Gonderiliyor: {news['title'][:90]}")
                  safe_title = html.escape(news["title"])
                  safe_news_link = html.escape(news["link"], quote=True)
                  message = (
                      f"<b>{safe_title}</b>\n\n"
                      f"<a href=\"{safe_news_link}\">TradingView'de oku</a>"
                  )

                  send_telegram(message)
                  time.sleep(2)

              browser.close()

          save_state(latest_key, current_keys + old_news)
          print("TradingView haber cache'i guncellendi.")

      - name: Cache kaydet
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add tv_news_cache.json
          git commit -m "Haber cache guncellendi [skip ci]" || echo "Degisiklik yok"
          git pull --rebase || echo "Cekilecek yeni bir sey yok"
          git push || echo "Push hatasi, sonraki turda tekrar denenecek"
