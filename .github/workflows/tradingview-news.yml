name: TradingView Tum Haber Botu

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tradingview-news.yml'
      - 'tv_news_bot.py'
  schedule:
    - cron: '7 * * * *'
    - cron: '22 * * * *'
    - cron: '37 * * * *'
    - cron: '52 * * * *'
  repository_dispatch:
    types:
      - tradingview-news-tick
  workflow_dispatch:

jobs:
  check-news:
    runs-on: ubuntu-latest
    concurrency:
      group: tradingview-all-news-check
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kutuphaneleri yukle
        run: |
          pip install requests

      - name: TradingView haberlerini cek ve Telegram'a gonder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          python tv_news_bot.py

      - name: Cache kaydet
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase --autostash || true
          git add tv_news_cache.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok"
            exit 0
          fi
          git commit -m "Haber cache guncellendi [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "Push denemesi ${attempt} basarisiz; tekrar denenecek."
            sleep 5
          done
          echo "Cache GitHub'a yazilamadi."
          exit 1

  schedule-next:
    needs: check-news
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') }}
    runs-on: ubuntu-latest
    concurrency:
      group: tradingview-all-news-ticker
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Sonraki calismayi tetikle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "15 dakika sonra bir sonraki calisma tetiklenecek."
          sleep 900
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            --data '{"event_type":"tradingview-news-tick"}'
